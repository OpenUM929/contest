<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라벨 수정 - Leadership System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; overflow-y: auto; border-right: 1px solid #ddd; }
        .main-content { padding: 20px; }
        .macro-group { margin-bottom: 10px; }
        .label-item { cursor: pointer; padding: 5px 10px; }
        .label-item:hover { background: #f0f0f0; }
        .label-item.active { background: #e3f2fd; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar p-0">
                <div class="p-3 bg-light border-bottom">
                    <h5>라벨 수정</h5>
                    <div class="btn-group w-100 mb-2">
                        <button class="btn btn-outline-primary active" onclick="loadLabels('positive')">긍정</button>
                        <button class="btn btn-outline-danger" onclick="loadLabels('negative')">부정</button>
                    </div>
                    <button class="btn btn-success w-100" onclick="integrateData()">[AI 검토용 통합]</button>
                </div>
                <div class="p-2">
                    <input type="text" class="form-control mb-2" placeholder="검색..." onkeyup="filterLabels(this.value)">
                    <div id="labelList"></div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 main-content">
                <div id="editor" style="display:none;">
                    <h3 id="labelTitle"></h3>
                    <form id="labelForm">
                        <input type="hidden" id="labelType">
                        <div class="mb-3">
                            <label class="form-label">Label ID</label>
                            <input type="text" class="form-control" id="labelId" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Label Name</label>
                            <input type="text" class="form-control" id="labelName">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Macro</label>
                            <input type="text" class="form-control" id="labelMacro">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Weight</label>
                            <input type="number" class="form-control" id="labelWeight" min="0" max="1" step="0.1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Definition</label>
                            <textarea class="form-control" id="labelDefinition" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">When</label>
                            <input type="text" class="form-control" id="labelWhen">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Not When</label>
                            <input type="text" class="form-control" id="labelNotWhen">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Context Weight (JSON)</label>
                            <textarea class="form-control" id="labelContextWeight" rows="3">{"crisis": 1.0, "normal": 1.0, "innovation": 1.0}</textarea>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="saveLabel()">저장</button>
                        <button type="button" class="btn btn-danger" onclick="deleteLabel()">삭제</button>
                        <div id="saveStatus" class="mt-2"></div>
                    </form>
                </div>
                <div id="placeholder" class="text-center text-muted mt-5">
                    <h4>좌측에서 라벨을 선택하세요</h4>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/edit_labels.js"></script>
</body>
</html>
