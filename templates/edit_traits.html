<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트레이트 수정 - Leadership System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; overflow-y: auto; border-right: 1px solid #ddd; }
        .main-content { padding: 20px; }
        .trait-item { cursor: pointer; padding: 8px 12px; border-bottom: 1px solid #eee; }
        .trait-item:hover { background: #f0f0f0; }
        .trait-item.positive { border-left: 4px solid #28a745; }
        .trait-item.negative { border-left: 4px solid #dc3545; }
        .trait-item.active { background: #e3f2fd; }
        textarea.json-editor { font-family: monospace; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar p-0">
                <div class="p-3 bg-light border-bottom">
                    <h5>트레이트 수정</h5>
                    <div class="btn-group w-100 mb-2">
                        <button class="btn btn-outline-success active" onclick="filterTraits('positive')">긍정</button>
                        <button class="btn btn-outline-danger" onclick="filterTraits('negative')">부정</button>
                        <button class="btn btn-outline-secondary" onclick="filterTraits('all')">전체</button>
                    </div>
                    <button class="btn btn-success w-100" onclick="integrateData()">[AI 검토용 통합]</button>
                </div>
                <div class="p-2">
                    <input type="text" class="form-control mb-2" placeholder="검색..." onkeyup="filterTraitsByKeyword(this.value)">
                    <div id="traitList"></div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 main-content">
                <div id="editor" style="display:none;">
                    <h3 id="traitTitle"></h3>
                    <form id="traitForm">
                        <input type="hidden" id="traitId">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Trait ID</label>
                                    <input type="text" class="form-control" id="traitIdInput" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Trait Type</label>
                                    <input type="text" class="form-control" id="traitType" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Trait Name</label>
                                    <input type="text" class="form-control" id="traitName">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Description</label>
                                    <textarea class="form-control" id="traitDescription" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Required Labels (JSON Array)</label>
                                    <textarea class="form-control json-editor" id="traitRequired" rows="4"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Optional Labels (JSON Array)</label>
                                    <textarea class="form-control json-editor" id="traitOptional" rows="4"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Strengths (JSON Array)</label>
                                    <textarea class="form-control json-editor" id="traitStrengths" rows="3"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Risks (JSON Array)</label>
                                    <textarea class="form-control json-editor" id="traitRisks" rows="3"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Context Weight (JSON)</label>
                            <textarea class="form-control json-editor" id="traitContextWeight" rows="3"></textarea>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="saveTrait()">저장</button>
                        <button type="button" class="btn btn-danger" onclick="deleteTrait()">삭제</button>
                        <div id="saveStatus" class="mt-2"></div>
                    </form>
                </div>
                <div id="placeholder" class="text-center text-muted mt-5">
                    <h4>좌측에서 트레이트를 선택하세요</h4>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/edit_traits.js"></script>
</body>
</html>
