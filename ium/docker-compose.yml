version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: ium-db
    environment:
      POSTGRES_DB: ium
      POSTGRES_USER: ium
      POSTGRES_PASSWORD: ium_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ium"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ium-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    container_name: ium-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ium:ium_secret@db:5432/ium
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PUBLIC_DATA_API_KEY: ${PUBLIC_DATA_API_KEY}
      ENVIRONMENT: development
      MEDIA_CACHE_DIR: /tmp/ium_media
    volumes:
      - ./backend:/app
      - media_cache:/tmp/ium_media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  media_cache:
