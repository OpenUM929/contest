<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>이음(以音)</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#FFFDF7;color:#4A3728;font-size:16px;line-height:1.6;
      min-height:100vh
    }
    @media(min-width:768px){body{font-size:18px}}

    header{
      background:#FFF;padding:16px 20px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 1px 4px rgba(74,55,40,0.08);
      position:sticky;top:0;z-index:10
    }
    .header-user{display:flex;align-items:center;gap:8px;font-size:15px}
    .header-user .badge{font-size:20px}
    .header-user .name{font-weight:700;color:#4A3728}
    .header-user .type{font-size:13px;color:#888;background:#F5F0EB;padding:2px 10px;border-radius:10px}
    .btn-logout{
      background:none;border:1px solid #ddd;padding:8px 16px;
      border-radius:8px;font-size:14px;color:#888;cursor:pointer
    }
    .btn-logout:hover{background:#F5F0EB;border-color:#ccc}

    nav{
      display:flex;background:#FFF;
      border-bottom:1px solid #EDE8E2;
      position:sticky;top:58px;z-index:9
    }
    .tab-btn{
      flex:1;padding:14px 8px;border:none;background:none;
      font-size:15px;font-weight:600;color:#999;cursor:pointer;
      border-bottom:3px solid transparent;transition:all 0.2s
    }
    .tab-btn.active{color:#E8572A;border-bottom-color:#E8572A}
    .tab-btn:hover{color:#E8572A}
    @media(min-width:768px){.tab-btn{font-size:16px;padding:16px}}

    main{padding:20px;max-width:720px;margin:0 auto}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .loading{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}
    .error{text-align:center;padding:40px 20px;color:#EF4444;font-size:15px}
    .empty{text-align:center;padding:60px 20px;color:#bbb;font-size:15px}
    .empty .icon{font-size:48px;margin-bottom:12px}
    .empty .desc{font-size:14px;color:#ccc;margin-top:6px}

    .section-title{font-size:16px;font-weight:700;color:#4A3728;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid #EDE8E2}
    @media(min-width:768px){.section-title{font-size:18px}}

    .card{
      background:#FFF;border-radius:12px;padding:16px 18px;
      box-shadow:0 1px 4px rgba(74,55,40,0.08);
      margin-bottom:10px;cursor:pointer;transition:all 0.15s;
      border:1px solid transparent
    }
    .card:hover{box-shadow:0 4px 12px rgba(74,55,40,0.12);transform:translateY(-1px)}
    .card.no-hover{cursor:default}
    .card.no-hover:hover{transform:none;box-shadow:0 1px 4px rgba(74,55,40,0.08)}
    .card-title{font-size:16px;font-weight:600;margin-bottom:4px}
    .card-meta{font-size:13px;color:#999}
    .card-tag{
      display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;
      font-weight:600;margin-left:8px
    }
    .tag-done{background:#E8F5E9;color:#22C55E}
    .tag-pending{background:#FFF3E0;color:#FF9800}

    .survey-card .card-info{font-size:13px;color:#888;margin-top:6px;display:flex;gap:12px}

    .analytics-section{margin-bottom:24px}
    .analytics-question{font-size:15px;font-weight:600;margin-bottom:12px;color:#4A3728;padding:12px 0 4px;border-top:1px solid #EDE8E2}
    .my-answer-badge{display:inline-block;background:#FFF3E0;color:#E8572A;font-size:12px;padding:2px 8px;border-radius:6px;font-weight:600;margin-bottom:8px}
    .my-answer-text{background:#FEF9F0;border:1px solid #FFE0B2;border-radius:8px;padding:12px;font-size:14px;color:#4A3728;margin-bottom:12px;line-height:1.7;white-space:pre-wrap}

    .bar-item{margin:6px 0;display:flex;align-items:center;gap:8px}
    .bar-label{width:100px;font-size:13px;color:#4A3728;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar-track{flex:1;height:22px;background:#F5F0EB;border-radius:6px;overflow:hidden;position:relative}
    .bar-fill{height:100%;border-radius:6px;transition:width 0.4s ease;background:#E8572A;min-width:2px}
    .bar-fill.is-mine{background:#FFB800}
    .bar-pct{width:40px;font-size:12px;color:#999;text-align:right;flex-shrink:0}
    .bar-count{font-size:11px;color:#bbb;flex-shrink:0}

    .essay-card .card-title{color:#E8572A}
    .essay-modal-content{font-size:15px;line-height:1.9;white-space:pre-wrap;color:#4A3728;padding:4px 0}
    .essay-modal-meta{font-size:13px;color:#999;margin-bottom:16px}

    .profile-card{background:#FFF;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(74,55,40,0.08)}
    .profile-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F5F0EB;font-size:15px}
    .profile-row:last-child{border-bottom:none}
    .profile-label{color:#888}
    .profile-value{font-weight:600}
    .safety-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:600}
    .safety-good{background:#E8F5E9;color:#22C55E}
    .safety-warn{background:#FFF3E0;color:#FF9800}
    .safety-danger{background:#FFEBEE;color:#EF4444}

    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;
      display:flex;align-items:flex-start;justify-content:center;
      padding:20px;overflow-y:auto
    }
    .modal-overlay.hidden{display:none}
    .modal-box{
      background:#FFF;border-radius:16px;width:100%;max-width:640px;
      margin:20px auto;max-height:85vh;display:flex;flex-direction:column;
      box-shadow:0 8px 32px rgba(0,0,0,0.15)
    }
    .modal-box.wide{max-width:720px}
    .modal-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 20px 14px;border-bottom:1px solid #EDE8E2;flex-shrink:0
    }
    .modal-header h3{font-size:17px;font-weight:700;color:#4A3728;max-width:calc(100% - 40px)}
    .modal-close{
      background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;
      width:32px;height:32px;display:flex;align-items:center;justify-content:center;
      border-radius:50%;flex-shrink:0
    }
    .modal-close:hover{background:#F5F0EB;color:#4A3728}
    .modal-body{padding:16px 20px 20px;overflow-y:auto;flex:1}

    .survey-form-desc{font-size:14px;color:#888;margin-bottom:16px;line-height:1.6}
    .form-question{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #F5F0EB}
    .form-question:last-child{border-bottom:none}
    .form-q-text{font-size:15px;font-weight:600;margin-bottom:10px;color:#4A3728}
    .form-options{display:flex;flex-direction:column;gap:8px}
    .form-option{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border:2px solid #EDE8E2;border-radius:10px;
      cursor:pointer;transition:all 0.15s;font-size:15px
    }
    .form-option:hover{border-color:#E8572A;background:#FFF8F0}
    .form-option.selected{border-color:#E8572A;background:#FFF3E0}
    .form-option input[type="radio"]{accent-color:#E8572A;width:18px;height:18px}
    .form-textarea{
      width:100%;min-height:100px;padding:12px;border:2px solid #EDE8E2;
      border-radius:10px;font-size:15px;font-family:inherit;color:#4A3728;
      resize:vertical;transition:border-color 0.15s
    }
    .form-textarea:focus{outline:none;border-color:#E8572A}
    .btn-submit{
      display:block;width:100%;padding:14px;border:none;border-radius:12px;
      background:#E8572A;color:#FFF;font-size:16px;font-weight:700;
      cursor:pointer;transition:opacity 0.2s;margin-top:8px
    }
    .btn-submit:hover{opacity:0.9}
    .btn-submit:disabled{opacity:0.5;cursor:default}
    .btn-edit{
      display:inline-block;padding:8px 20px;border:2px solid #E8572A;
      border-radius:8px;background:#FFF;color:#E8572A;font-size:14px;
      font-weight:600;cursor:pointer;transition:all 0.15s
    }
    .btn-edit:hover{background:#FFF3E0}
    .btn-stt{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 16px;border:2px solid #E8572A;
      border-radius:8px;background:#FFF;color:#E8572A;
      font-size:14px;font-weight:600;cursor:pointer;
      margin-top:8px;transition:all 0.15s
    }
    .btn-stt:hover{background:#FFF3E0}
    .btn-stt.recording{
      background:#FFEBEE;border-color:#EF4444;color:#EF4444;
      animation:stt-pulse 1s infinite
    }
    .stt-status{font-size:13px;color:#EF4444;margin-top:6px;display:flex;align-items:center;gap:6px}
    .stt-status.hidden{display:none}
    @keyframes stt-pulse{0%,100%{opacity:1}50%{opacity:0.6}}
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-user">
        <span class="badge" id="userBadge">&#128100;</span>
        <span class="name" id="userName"></span>
        <span class="type" id="userType"></span>
      </div>
      <button class="btn-logout" id="logoutBtn">로그아웃</button>
    </header>
    <nav id="tabBar">
      <button class="tab-btn active" data-tab="survey">설문</button>
      <button class="tab-btn" data-tab="content">콘텐츠</button>
      <button class="tab-btn" data-tab="myinfo">내 정보</button>
    </nav>
    <main>
      <div id="tab-survey" class="tab-panel active"><div class="loading">로딩 중...</div></div>
      <div id="tab-content" class="tab-panel"></div>
      <div id="tab-myinfo" class="tab-panel"></div>
    </main>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    var API = window.location.origin;
    var userId = localStorage.getItem('temp_user_id');
    var userType = localStorage.getItem('temp_user_type');
    var nickname = localStorage.getItem('temp_nickname');

    if (!userId) { window.location.href = '/login'; }

    document.getElementById('userBadge').textContent = userType === 'elder' ? '\u{1F464}' : '\u{1F31F}';
    document.getElementById('userName').textContent = nickname || '사용자';
    document.getElementById('userType').textContent = userType === 'elder' ? '노인' : '청년';

    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('temp_user_id');
      localStorage.removeItem('temp_user_type');
      localStorage.removeItem('temp_nickname');
      window.location.href = '/login';
    });

    function apiGet(path) {
      return fetch(API + path).then(function(r) {
        if (!r.ok) { return r.json().then(function(e) { throw new Error(e.detail || '요청 실패'); }); }
        return r.json();
      });
    }

    function apiPost(path, data) {
      return fetch(API + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }).then(function(r) {
        if (!r.ok) { return r.json().then(function(e) { throw new Error(e.detail || '요청 실패'); }); }
        return r.json();
      });
    }

    function apiPut(path, data) {
      return fetch(API + path, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }).then(function(r) {
        if (!r.ok) { return r.json().then(function(e) { throw new Error(e.detail || '요청 실패'); }); }
        return r.json();
      });
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      var btn = document.querySelector('.tab-btn[data-tab="' + name + '"]');
      if (btn) btn.classList.add('active');
      var panel = document.getElementById('tab-' + name);
      if (panel) panel.classList.add('active');
      if (name === 'survey' && !window._surveyLoaded) { loadSurveyTab(); }
      if (name === 'content' && !window._contentLoaded) { loadContentTab(); }
      if (name === 'myinfo' && !window._myinfoLoaded) { loadMyInfoTab(); }
    }

    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
    });

    document.getElementById('modalCloseBtn').addEventListener('click', hideModal);
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) hideModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') hideModal();
    });

    function showModal(title, bodyHtml, wide) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = bodyHtml;
      var box = document.getElementById('modalBox');
      if (wide) { box.classList.add('wide'); } else { box.classList.remove('wide'); }
      document.getElementById('modalOverlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function hideModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function escapeHtml(text) {
      if (!text) return '';
      var d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function formatDate(isoStr) {
      if (!isoStr) return '';
      var d = new Date(isoStr);
      return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
    }

    /* ===== Survey Tab ===== */
    window._surveyLoaded = false;
    window._surveyCache = {};

    function loadSurveyTab() {
      window._surveyLoaded = true;
      var panel = document.getElementById('tab-survey');
      panel.innerHTML = '<div class="loading">설문 목록을 불러오는 중...</div>';

      apiGet('/api/chat/users/' + userId + '/available-surveys').then(function(data) {
        var surveys = data.surveys || [];
        var responded = surveys.filter(function(s) { return s.has_responded; });
        var pending = surveys.filter(function(s) { return !s.has_responded; });

        var html = '';
        if (responded.length > 0) {
          html += '<div class="section-title">응답한 설문 (' + responded.length + ')</div>';
          responded.forEach(function(s) {
            html += '<div class="card survey-card" data-topic-id="' + s.topic_id + '" data-status="responded">';
            html += '<div class="card-title">' + escapeHtml(s.title) + '<span class="card-tag tag-done">응답 완료</span></div>';
            html += '<div class="card-meta">' + (s.active_week ? formatDate(s.active_week) + ' 주차' : '') + '</div>';
            html += '<div class="card-info">참여자 ' + (s.total_respondents || 0) + '명 · 클릭하여 통계 보기</div>';
            html += '</div>';
          });
        }
        if (pending.length > 0) {
          html += '<div class="section-title">새로운 설문 (' + pending.length + ')</div>';
          pending.forEach(function(s) {
            html += '<div class="card survey-card" data-topic-id="' + s.topic_id + '" data-status="pending">';
            html += '<div class="card-title">' + escapeHtml(s.title) + '<span class="card-tag tag-pending">미응답</span></div>';
            html += '<div class="card-meta">' + (s.active_week ? formatDate(s.active_week) + ' 주차' : '') + '</div>';
            html += '<div class="card-info">참여자 ' + (s.total_respondents || 0) + '명 · 클릭하여 설문 참여</div>';
            html += '</div>';
          });
        }
        if (surveys.length === 0) {
          html += '<div class="empty"><div class="icon">설문</div><div>이번 주 설문 주제가 아직 준비되지 않았습니다.</div><div style="font-size:13px;color:#999;margin-top:6px">담당 복지사가 주제를 발행하면 여기에 표시됩니다.</div></div>';
        }
        panel.innerHTML = html;
        panel.querySelectorAll('.survey-card').forEach(function(card) {
          card.addEventListener('click', function() {
            var status = card.dataset.status;
            var topicId = card.dataset.topicId;
            if (status === 'responded') {
              loadSurveyAnalytics(topicId);
            } else {
              openSurveyForm(topicId, false);
            }
          });
        });
      }).catch(function(err) {
        panel.innerHTML = '<div class="error">설문 목록을 불러오지 못했습니다: ' + escapeHtml(err.message) + '</div>';
      });
    }

    function loadSurveyAnalytics(topicId) {
      showModal('통계 로딩 중...', '<div class="loading">통계를 불러오는 중...</div>');
      apiGet('/api/chat/surveys/' + topicId + '/my-analytics?user_id=' + userId).then(function(data) {
        var html = '<div class="analytics-section">';
        html += '<div style="font-size:14px;color:#888;margin-bottom:12px">총 ' + data.total_respondents + '명 응답</div>';

        (data.my_responses || []).forEach(function(q) {
          var typeLabel = q.question_type === 'choice' ? '선택형' : '서술형';
          html += '<div class="analytics-question">' + escapeHtml(q.question_text) + ' <span style="font-size:12px;color:#999;font-weight:400">(' + typeLabel + ')</span></div>';

          if (q.question_type === 'choice') {
            if (q.my_answer) {
              html += '<div class="my-answer-badge">내 선택: ' + escapeHtml(q.my_answer) + '</div>';
            }
            html += makeBarChart(q.statistics, q.my_answer);
          } else if (q.question_type === 'narrative') {
            if (q.my_answer) {
              html += '<div class="my-answer-badge">내 답변</div>';
              html += '<div class="my-answer-text">' + escapeHtml(q.my_answer) + '</div>';
            }
            if (q.sample_responses && q.sample_responses.length > 0) {
              html += '<div style="font-size:13px;color:#888;margin-bottom:6px">다른 사람의 답변 (' + (q.response_count || q.sample_responses.length) + '건)</div>';
              q.sample_responses.slice(0, 5).forEach(function(sr) {
                html += '<div class="my-answer-text" style="background:#F9F9F9;border-color:#EDE8E2;font-size:13px">' + escapeHtml(sr.text) + '</div>';
              });
            }
          }
        });

        html += '</div>';
        html += '<div style="text-align:center;padding-top:8px"><button class="btn-edit" onclick="openSurveyForm(\'' + topicId + '\', true)">수정하기</button></div>';
        showModal(escapeHtml(data.topic_title) + ' - 통계', html);
      }).catch(function(err) {
        showModal('오류', '<div class="error">' + escapeHtml(err.message) + '</div>');
      });
    }

    function makeBarChart(stats, myAnswer) {
      if (!stats || stats.length === 0) { return '<div class="empty" style="padding:16px">통계 데이터가 없습니다.</div>'; }
      var html = '<div>';
      stats.forEach(function(s) {
        var isMine = s.label === myAnswer;
        var pct = Math.max(s.percent, 0);
        var width = Math.max(pct, 0);
        html += '<div class="bar-item">';
        html += '<div class="bar-label">' + escapeHtml(s.label) + '</div>';
        html += '<div class="bar-track"><div class="bar-fill' + (isMine ? ' is-mine' : '') + '" style="width:' + width + '%"></div></div>';
        html += '<div class="bar-pct">' + pct + '%</div>';
        html += '<div class="bar-count">(' + s.count + '명)</div>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    function openSurveyForm(topicId, isEdit) {
      showModal('로딩 중...', '<div class="loading">설문지를 불러오는 중...</div>', true);

      var loadTopic = apiGet('/api/chat/topics/' + topicId);
      var loadMyResp = isEdit ? apiGet('/api/chat/surveys/' + topicId + '/my-analytics?user_id=' + userId) : Promise.resolve(null);

      Promise.all([loadTopic, loadMyResp]).then(function(results) {
        var topic = results[0];
        var analytics = results[1];

        var title = isEdit ? escapeHtml(topic.title) + ' - 수정' : escapeHtml(topic.title) + ' - 설문 참여';
        var questions = [];
        if (topic.choices && topic.choices.questions) {
          questions = topic.choices.questions;
        }

        var html = '';
        html += '<div class="survey-form-desc">' + escapeHtml(topic.description || '') + '</div>';

        var existing = {};
        if (analytics && analytics.my_responses) {
          analytics.my_responses.forEach(function(r) {
            existing[r.question_id] = r;
          });
        }

        html += '<div id="surveyForm">';
        questions.forEach(function(q, idx) {
          var qId = q.id;
          var qText = q.text || '질문 ' + (idx + 1);
          var qType = q.type || 'narrative';
          var existingResp = existing[qId] || {};

          html += '<div class="form-question">';
          html += '<div class="form-q-text">' + (idx + 1) + '. ' + escapeHtml(qText) + '</div>';

          if (qType === 'choice') {
            var options = q.options || [];
            html += '<div class="form-options" data-qid="' + qId + '" data-qtype="choice">';
            options.forEach(function(opt) {
              var checked = existingResp.my_answer === opt.label ? ' checked' : '';
              html += '<label class="form-option' + (checked ? ' selected' : '') + '">';
              html += '<input type="radio" name="q_' + qId + '" value="' + escapeHtml(opt.id) + '" data-label="' + escapeHtml(opt.label) + '"' + checked + ' onchange="this.parentElement.classList.toggle(\'selected\', this.checked)">';
              html += escapeHtml(opt.label);
              html += '</label>';
            });
            html += '</div>';
          } else {
            var val = existingResp.my_answer || '';
            html += '<textarea class="form-textarea" data-qid="' + qId + '" data-qtype="narrative" placeholder="자유롭게 작성해 주세요...">' + escapeHtml(val) + '</textarea>';
            html += '<button class="btn-stt" type="button" onclick="startRecording(this)"><span class="stt-icon">&#127908;</span><span class="stt-text">음성으로 말하기</span></button>';
            html += '<div class="stt-status hidden"><span class="stt-timer">0</span>/30초 · 녹음 중</div>';
          }

          html += '</div>';
        });
        html += '</div>';

        var btnLabel = isEdit ? '수정 완료' : '제출하기';
        html += '<button class="btn-submit" onclick="submitSurveyForm(\'' + topicId + '\', ' + (isEdit ? 'true' : 'false') + ')">' + btnLabel + '</button>';

        showModal(title, html, true);
      }).catch(function(err) {
        showModal('오류', '<div class="error">설문지를 불러오지 못했습니다: ' + escapeHtml(err.message) + '</div>');
      });
    }

    function submitSurveyForm(topicId, isEdit) {
      var formEl = document.getElementById('surveyForm');
      if (!formEl) return;

      var responses = [];

      formEl.querySelectorAll('.form-question').forEach(function(qEl) {
        var choiceGroup = qEl.querySelector('.form-options');
        var textarea = qEl.querySelector('.form-textarea');

        if (choiceGroup) {
          var checked = choiceGroup.querySelector('input[type="radio"]:checked');
          if (checked) {
            responses.push({
              question_id: choiceGroup.dataset.qid,
              question_type: 'choice',
              selected_option_id: checked.value,
              selected_option_label: checked.dataset.label,
              narrative_text: null,
            });
          }
        } else if (textarea) {
          responses.push({
            question_id: textarea.dataset.qid,
            question_type: 'narrative',
            selected_option_id: null,
            selected_option_label: null,
            narrative_text: textarea.value,
          });
        }
      });

      if (responses.length === 0) {
        alert('하나 이상의 질문에 답변해 주세요.');
        return;
      }

      var btn = document.querySelector('.btn-submit');
      btn.disabled = true;
      btn.textContent = '제출 중...';

      var method = isEdit ? apiPut : apiPost;
      method('/api/chat/surveys/' + topicId + '/respond', { user_id: userId, responses: responses }).then(function() {
        hideModal();
        loadSurveyTab();
        alert(isEdit ? '답변이 수정되었습니다.' : '답변이 제출되었습니다.');
      }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = isEdit ? '수정 완료' : '제출하기';
        alert('제출 실패: ' + err.message);
      });
    }

    /* ===== STT (Speech-to-Text) ===== */
    var STT_MAX_DURATION = 30;

    function startRecording(btn) {
      if (btn.classList.contains('recording')) return;
      var container = btn.parentElement;
      var textarea = container.querySelector('.form-textarea');
      var status = container.querySelector('.stt-status');
      var timerSpan = status.querySelector('.stt-timer');

      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
        var recorder = new MediaRecorder(stream);
        var chunks = [];
        var elapsed = 0;

        recorder.ondataavailable = function(e) {
          if (e.data.size > 0) chunks.push(e.data);
        };

        recorder.onstop = function() {
          clearInterval(timer);
          btn.classList.remove('recording');
          btn.querySelector('.stt-text').textContent = '음성으로 말하기';
          status.classList.add('hidden');
          stream.getTracks().forEach(function(t) { t.stop(); });

          if (chunks.length === 0) return;
          var blob = new Blob(chunks, { type: 'audio/webm' });
          sendSTT(textarea, blob);
        };

        recorder.start();
        btn.classList.add('recording');
        btn.querySelector('.stt-text').textContent = '녹음 중...';
        status.classList.remove('hidden');
        timerSpan.textContent = '0';

        var timer = setInterval(function() {
          elapsed++;
          timerSpan.textContent = elapsed;
          if (elapsed >= STT_MAX_DURATION) {
            recorder.stop();
          }
        }, 1000);

        btn._recorder = recorder;
        btn._timer = timer;
      }).catch(function(err) {
        alert('마이크 접근이 거부되었습니다.\n' + err.message);
      });
    }

    function sendSTT(textarea, blob) {
      textarea.placeholder = '음성 인식 중...';
      var fd = new FormData();
      fd.append('file', blob, 'recording.webm');

      fetch(API + '/api/chat/voice/stt', {
        method: 'POST',
        body: fd,
      }).then(function(r) {
        if (!r.ok) throw new Error('음성 인식 실패');
        return r.json();
      }).then(function(data) {
        textarea.value = (textarea.value || '') + (textarea.value ? ' ' : '') + (data.text || '');
        textarea.placeholder = '자유롭게 작성해 주세요...';
      }).catch(function(err) {
        textarea.placeholder = '자유롭게 작성해 주세요...';
        alert('음성 인식 실패: ' + err.message);
      });
    }

    /* ===== Content Tab ===== */
    window._contentLoaded = false;

    function loadContentTab() {
      window._contentLoaded = true;
      var panel = document.getElementById('tab-content');
      panel.innerHTML = '<div class="loading">콘텐츠를 불러오는 중...</div>';

      apiGet('/api/chat/content').then(function(data) {
        var modules = data.modules || [];
        var html = '';

        modules.forEach(function(mod) {
          html += '<div class="section-title">' + (mod.icon || '') + ' ' + escapeHtml(mod.title) + ' (' + (mod.items ? mod.items.length : 0) + ')</div>';
          if (!mod.items || mod.items.length === 0) {
            html += '<div class="empty" style="padding:30px"><div class="icon">콘텐츠</div><div>아직 등록된 콘텐츠가 없습니다</div></div>';
            return;
          }
          mod.items.forEach(function(item) {
            var typeLabel = item.content_type === 'poem' ? '시' : item.content_type === 'novel' ? '소설' : '수필';
            html += '<div class="card essay-card" data-id="' + escapeHtml(item.id) + '" data-title="' + escapeHtml(item.title) + '" data-content="' + escapeHtml(item.content || '').replace(/"/g, '&quot;') + '" data-type="' + escapeHtml(item.content_type) + '">';
            html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
            html += '<div class="card-meta">' + typeLabel + ' · ' + (item.contributor_cnt || 0) + '명 참여 · ' + (item.published_at ? formatDate(item.published_at) : '') + '</div>';
            html += '</div>';
          });
        });

        panel.innerHTML = html;
        panel.querySelectorAll('.essay-card').forEach(function(card) {
          card.addEventListener('click', function() {
            var title = card.dataset.title;
            var content = card.dataset.content;
            var typeLabel = card.dataset.type === 'poem' ? '시' : card.dataset.type === 'novel' ? '소설' : '수필';
            showModal(title, '<div class="essay-modal-meta">' + typeLabel + '</div><div class="essay-modal-content">' + escapeHtml(content) + '</div>');
          });
        });
      }).catch(function(err) {
        panel.innerHTML = '<div class="error">콘텐츠를 불러오지 못했습니다: ' + escapeHtml(err.message) + '</div>';
      });
    }

    /* ===== My Info Tab ===== */
    window._myinfoLoaded = false;

    function loadMyInfoTab() {
      window._myinfoLoaded = true;
      var panel = document.getElementById('tab-myinfo');
      panel.innerHTML = '<div class="loading">정보를 불러오는 중...</div>';

      Promise.all([
        apiGet('/api/chat/users/' + userId + '/profile'),
        apiGet('/api/safety/check/' + userId)
      ]).then(function(results) {
        var profile = results[0];
        var safety = results[1];

        var html = '<div class="profile-card">';

        html += '<div class="profile-row"><span class="profile-label">닉네임</span><span class="profile-value">' + escapeHtml(profile.nickname) + '</span></div>';
        html += '<div class="profile-row"><span class="profile-label">유형</span><span class="profile-value">' + (profile.user_type === 'elder' ? '노인' : '청년') + '</span></div>';
        html += '<div class="profile-row"><span class="profile-label">가입일</span><span class="profile-value">' + (profile.created_at ? formatDate(profile.created_at) : '-') + '</span></div>';
        html += '<div class="profile-row"><span class="profile-label">마지막 접속</span><span class="profile-value">' + (profile.last_seen_at ? formatDate(profile.last_seen_at) : '-') + '</span></div>';

        var safetyLevel = 'good';
        var safetyText = '안전 상태 양호';
        if (safety.no_contact) { safetyLevel = 'danger'; safetyText = '3일 이상 미접속'; }
        else if (safety.emotion_trend_alert) { safetyLevel = 'warn'; safetyText = '감정 하락 추세'; }
        else if (safety.alerts_triggered && safety.alerts_triggered.length > 0) { safetyLevel = 'warn'; safetyText = '주의 알림 있음'; }

        var cls = safetyLevel === 'good' ? 'safety-good' : (safetyLevel === 'warn' ? 'safety-warn' : 'safety-danger');
        html += '<div class="profile-row"><span class="profile-label">안전 상태</span><span class="safety-badge ' + cls + '">' + safetyText + '</span></div>';

        html += '</div>';
        panel.innerHTML = html;
      }).catch(function(err) {
        panel.innerHTML = '<div class="error">정보를 불러오지 못했습니다: ' + escapeHtml(err.message) + '</div>';
      });
    }

    loadSurveyTab();
  </script>
</body>
</html>
